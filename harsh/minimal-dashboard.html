<!DOCTYPE html>
<html>
<head><title>Minimal Dashboard</title><link rel="stylesheet" href="style.css"></head>
<body>
    <div class="card" style="text-align: center; max-width: 500px;">
        <h1 class="main-title">Dashboard</h1>
        
        <h2 id="welcomeName" style="color: white; margin-bottom: 5px;"></h2>
        <p style="color: #cca8ff; margin-top: 0; font-size: 1.1em;">Portfolio Dashboard</p>
        
        <div style="background: rgba(0,0,0,0.2); padding: 25px; border-radius: 12px; margin: 30px 0;">
            <p style="font-size: 1.2em; margin-bottom: 5px;"><strong>Status:</strong> <span style="color: #00e676;">Active ✨</span></p>
            <p style="color: #d0bfff; font-size: 0.9em; margin-top: 0;">Your customized portfolio is generated and ready.</p>
        </div>

        <button onclick="window.location.href='view-portfolio.html'" style="margin-bottom: 15px;">View My Portfolio</button>
        
        <!-- Danger zone logout button slightly transparent -->
        <button style="background: rgba(255,255,255,0.1); border: 1px solid white; color: white; margin-top: 10px;" onclick="logout()">Logout</button>
    </div>

    <script>
        const email = localStorage.getItem('userEmail');
        if(!email) window.location.href = 'create-portfolio.html';

        fetch(`http://localhost:8080/api/portfolio/${email}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('welcomeName').textContent = "Welcome, " + data.name + "!";
            });

        function logout() {
            localStorage.clear();
            window.location.href = 'create-portfolio.html';
        }
    </script>
</body>
</html>
